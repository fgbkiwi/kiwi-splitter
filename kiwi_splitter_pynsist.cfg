# ============================================================
# Pynsist Configuration: Kiwi-Splitter
# ============================================================

[Application]
name=Kiwi-Splitter
# version: sincronizado de pyproject.toml pelo script de build
version=1.1.4
entry_point=_kiwi_launcher:main
icon=kiwi-splitter.ico
console=false

[Python]
version=3.14.3
bitness=64

[Include]
packages=PyQt6
         pymupdf
         tiktoken
         regex
         charset_normalizer

files=kiwi_splitter.py
      _kiwi_launcher.py
      .venv\Lib\site-packages\tiktoken_ext > $INSTDIR\pkgs\tiktoken_ext
